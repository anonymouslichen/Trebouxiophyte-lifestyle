# NCBI Entrez email (required by NCBI usage policy)
entrez_email: "your-email@example.com"

# Batch size for Entrez queries
batch_size: 500

# Retry settings for NCBI API calls
max_retries: 3
retry_delay_seconds: 3

# Genus name -> NCBI Taxonomy ID
